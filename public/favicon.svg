<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#roadGradient)"/>
  
  <!-- Road with dashed lines -->
  <path d="M 30 30 Q 50 45 70 30" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 30 50 Q 50 65 70 50" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 30 70 Q 50 85 70 70" stroke="white" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Center dashed line -->
  <path d="M 50 28 L 50 35" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <path d="M 50 42 L 50 58" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <path d="M 50 65 L 50 72" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Warning triangle for damage -->
  <polygon points="50,38 58,52 42,52" fill="#ef4444" stroke="white" stroke-width="1.5"/>
  <text x="50" y="51" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">!</text>
</svg>
